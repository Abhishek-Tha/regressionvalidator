name: 'BlockGuard — EDS Block Regression'
description: 'Detect changed EDS blocks, find affected pages, compare base vs PR preview, and report regressions'
author: 'BlockGuard'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  owner:
    description: 'GitHub repository owner'
    required: true
  repo:
    description: 'GitHub repository name'
    required: true
  base-branch:
    description: 'Base branch to compare against'
    required: false
    default: 'main'
  base-ref:
    description: 'Base git ref for diff (defaults to PR base SHA)'
    required: false
  head-ref:
    description: 'Head git ref for diff (defaults to PR head SHA)'
    required: false
  site-map-url:
    description: 'Full URL to sitemap.xml (e.g. https://main--repo--owner.aem.live/sitemap.xml)'
    required: false
  page-index-url:
    description: 'Full URL to query-index.json'
    required: false
  live-origin:
    description: 'Live site origin (e.g. https://main--repo--owner.aem.live)'
    required: false
  preview-origin:
    description: 'Branch preview origin (e.g. https://feature--repo--owner.aem.page)'
    required: false
  config:
    description: 'Path to blockguard.config.yml'
    required: false
    default: 'blockguard.config.yml'
  mode:
    description: 'Test mode: representative or full'
    required: false
    default: 'representative'
  max-pages:
    description: 'Maximum pages to test per run'
    required: false
    default: '15'
  viewport-width:
    description: 'Screenshot viewport width in pixels'
    required: false
    default: '1440'
  fail-on-regression:
    description: 'Set to "true" to fail the workflow on regressions'
    required: false
    default: 'false'
  advisory-mode:
    description: 'Set to "true" to always pass the workflow (post warnings only)'
    required: false
    default: 'true'
  output-dir:
    description: 'Directory for report output'
    required: false
    default: '/tmp/blockguard-report'
  github-token:
    description: 'GitHub token for posting PR comments and uploading artifacts'
    required: true

outputs:
  status:
    description: 'Regression result: passed, warning, or failed'
  affected-pages:
    description: 'Number of pages affected by the changed blocks'
  tested-pages:
    description: 'Number of pages actually tested'
  report-path:
    description: 'Path to the generated HTML report'
  run-id:
    description: 'BlockGuard run identifier'

runs:
  using: 'composite'
  steps:
    # ── Install system-level Puppeteer dependencies (Ubuntu / GitHub-hosted runners) ──
    - name: Install Puppeteer system dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          libnss3 \
          libatk1.0-0t64 \
          libatk-bridge2.0-0t64 \
          libcups2t64 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libgbm1 \
          libxkbcommon0 \
          libpango-1.0-0 \
          libcairo2 \
          libasound2t64 \
          libx11-xcb1 \
          libxcb-dri3-0 \
          libdrm2

    # ── Download Chrome into the runner cache ──────────────────────────────────
    - name: Install Chrome for Puppeteer
      shell: bash
      env:
        PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
      run: npx puppeteer browsers install chrome

    # ── Run the bundled action ─────────────────────────────────────────────────
    - name: Run BlockGuard
      shell: bash
      env:
        PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        INPUT_OWNER: ${{ inputs.owner }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_BASE-BRANCH: ${{ inputs.base-branch }}
        INPUT_BASE-REF: ${{ inputs.base-ref }}
        INPUT_HEAD-REF: ${{ inputs.head-ref }}
        INPUT_SITE-MAP-URL: ${{ inputs.site-map-url }}
        INPUT_PAGE-INDEX-URL: ${{ inputs.page-index-url }}
        INPUT_LIVE-ORIGIN: ${{ inputs.live-origin }}
        INPUT_PREVIEW-ORIGIN: ${{ inputs.preview-origin }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_MAX-PAGES: ${{ inputs.max-pages }}
        INPUT_VIEWPORT-WIDTH: ${{ inputs.viewport-width }}
        INPUT_FAIL-ON-REGRESSION: ${{ inputs.fail-on-regression }}
        INPUT_ADVISORY-MODE: ${{ inputs.advisory-mode }}
        INPUT_OUTPUT-DIR: ${{ inputs.output-dir }}
        INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/dist-bundled/index.js"
